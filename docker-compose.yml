services:
  postgres:
    image: postgres:17-alpine
    container_name: moneypath-postgres
    environment:
      POSTGRES_DB: moneypath
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moneypath"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moneypath-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/moneypath?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  postgres_data:
